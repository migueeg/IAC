version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - ./casc_configs:/var/jenkins_home/casc_configs
      - ./jobs:/var/jenkins_home/jobs
    env_file:
      - .env
    environment:
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc_configs/jenkins.yaml

  agente-jenkins:
    image: jenkins/ssh-agent:latest
    container_name: agente-jenkins
    ports:
      - "2222:22"
    volumes:
      - ./agent_home:/home/jenkins
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=ssh-rsa  jenkins@agente